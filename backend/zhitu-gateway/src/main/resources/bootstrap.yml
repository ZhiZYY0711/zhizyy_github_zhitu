spring:
  application:
    name: zhitu-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:3266317a-4949-4b36-8e49-e2b8ea5609ec}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:3266317a-4949-4b36-8e49-e2b8ea5609ec}
        group: DEFAULT_GROUP
        file-extension: yaml
        import-check:
          enabled: false
        shared-configs:
          - data-id: zhitu-redis.yaml
            group: DEFAULT_GROUP
            refresh: true
