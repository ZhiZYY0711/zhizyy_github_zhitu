spring:
  application:
    name: zhitu-system
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:9f47ef46-0532-4144-9352-de979a04b191}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:9f47ef46-0532-4144-9352-de979a04b191}
        group: DEFAULT_GROUP
        file-extension: yaml
        import-check:
          enabled: false
        shared-configs:
          - data-id: zhitu-db.yaml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: zhitu-redis.yaml
            group: DEFAULT_GROUP
            refresh: true
