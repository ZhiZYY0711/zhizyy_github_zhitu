spring:
  application:
    name: zhitu-system
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:6491b673-b4c0-4b1e-8560-bc0f98b74a1c}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:6491b673-b4c0-4b1e-8560-bc0f98b74a1c}
        group: DEFAULT_GROUP
        file-extension: yaml
        shared-configs:
          - data-id: zhitu-db.yaml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: zhitu-redis.yaml
            group: DEFAULT_GROUP
            refresh: true
