spring:
  application:
    name: zhitu-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:c7a0e83d-c02f-42c6-84bf-d3d7ed28272b}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:c7a0e83d-c02f-42c6-84bf-d3d7ed28272b}
        group: DEFAULT_GROUP
        file-extension: yaml
        import-check:
          enabled: false
        shared-configs:
          - data-id: zhitu-db.yaml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: zhitu-redis.yaml
            group: DEFAULT_GROUP
            refresh: true
