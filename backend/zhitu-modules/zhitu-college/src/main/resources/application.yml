server:
  port: 8083

spring:
  mybatis-plus:
    configuration:
      map-underscore-to-camel-case: true
    global-config:
      db-config:
        logic-delete-field: isDeleted
        logic-delete-value: true
        logic-not-delete-value: false

zhitu:
  jwt:
    secret: zhitu-secret-key-2024-spring-cloud-alibaba-microservices

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.zhitu: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
