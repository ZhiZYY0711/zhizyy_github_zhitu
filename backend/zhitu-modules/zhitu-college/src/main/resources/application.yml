server:
  port: 8093

spring:
  mybatis-plus:
    configuration:
      map-underscore-to-camel-case: true
    global-config:
      db-config:
        logic-delete-field: isDeleted
        logic-delete-value: true
        logic-not-delete-value: false

zhitu:
  jwt:
    secret: zhitu-secret-key-2024-spring-cloud-alibaba-microservices

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    # 启用 "Try it out" 功能，允许用户直接在 Swagger UI 中测试 API
    try-it-out-enabled: true
    # 显示请求持续时间
    display-request-duration: true
    # 操作排序
    operations-sorter: alpha
    # 标签排序
    tags-sorter: alpha
  # 配置 API 服务器地址（通过 Gateway 访问）
  server:
    url: http://localhost:8888
    description: API Gateway

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.zhitu: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
