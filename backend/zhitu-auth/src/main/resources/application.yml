server:
  port: 8081

spring:
  # MyBatis-Plus（数据源由 Nacos 共享配置注入）
  mybatis-plus:
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    global-config:
      db-config:
        logic-delete-field: isDeleted
        logic-delete-value: true
        logic-not-delete-value: false

# JWT 配置
zhitu:
  jwt:
    secret: zhitu-secret-key-2024-spring-cloud-alibaba-microservices
    access-token-expiration: 3600      # 1小时 (秒)
    refresh-token-expiration: 2592000  # 30天 (秒)

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    # 启用 "Try it out" 功能，允许用户直接在 Swagger UI 中测试 API
    try-it-out-enabled: true
    # 显示请求持续时间
    display-request-duration: true
    # 操作排序
    operations-sorter: alpha
    # 标签排序
    tags-sorter: alpha
  # 配置 API 服务器地址（通过 Gateway 访问）
  server:
    url: http://localhost:8888
    description: API Gateway

# 管理端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 日志
logging:
  level:
    com.zhitu: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
