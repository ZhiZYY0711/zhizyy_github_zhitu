server:
  port: 8081

spring:
  # JPA 配置（数据源由 Nacos 共享配置注入）
  jpa:
    hibernate:
      ddl-auto: validate   # 生产用validate，开发期间可改为update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

# JWT 配置
zhitu:
  jwt:
    secret: zhitu-secret-key-2024-spring-cloud-alibaba-microservices
    access-token-expiration: 3600      # 1小时 (秒)
    refresh-token-expiration: 2592000  # 30天 (秒)

# 管理端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 日志
logging:
  level:
    com.zhitu: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
