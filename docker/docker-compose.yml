version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15
    container_name: zhitu-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: zhitu_cloud
      TZ: Asia/Shanghai
    ports:
      - "15432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - zhitu-net

  # Redis 缓存
  redis:
    image: redis:7.0
    container_name: zhitu-redis
    restart: always
    command: redis-server --requirepass 123456 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    networks:
      - zhitu-net

  # MySQL（Nacos 专用）
  nacos-mysql:
    image: mysql:8.0
    container_name: zhitu-nacos-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: nacos_config
      TZ: Asia/Shanghai
    ports:
      - "13306:3306"
    volumes:
      - ./nacos/mysql:/var/lib/mysql
      - ./mysql-schema.sql:/docker-entrypoint-initdb.d/mysql-schema.sql
    networks:ql-schema.sql:/docker-entrypoint-initdb.d/mysql-schema.sql
    networks:
      - zhitu-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nacos 注册中心/配置中心
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: zhitu-nacos
    restart: always
    depends_on:
      nacos-mysql:
        condition: service_healthy
    environment:
      - MODE=standalone
      - TZ=Asia/Shanghai
      - JVM_XMS=256m
      - JVM_XMX=512m
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - ./nacos/logs:/home/nacos/logs
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    networks:
      - zhitu-net

  # MinIO 对象存储
  minio:
    image: minio/minio
    container_name: zhitu-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio/data:/data
      - ./minio/config:/root/.minio
    networks:
      - zhitu-net

networks:
  zhitu-net:
    driver: bridge
