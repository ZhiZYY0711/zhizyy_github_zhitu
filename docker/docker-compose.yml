version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15
    container_name: zhitu-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: zhitu_cloud
      TZ: Asia/Shanghai
    ports:
      - "15432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - zhitu-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7.0
    container_name: zhitu-redis
    restart: always
    command: redis-server --requirepass 123456 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    networks:
      - zhitu-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nacos 注册中心/配置中心
  nacos:
    image: nacos/nacos-server:v2.5.1
    container_name: zhitu-nacos
    restart: always
    environment:
      - PREFER_HOST_MODE=hostname
      - MODE=standalone
      - NACOS_AUTH_IDENTITY_KEY=serverIdentity
      - NACOS_AUTH_IDENTITY_VALUE=security
      - NACOS_AUTH_TOKEN=VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg=
      - TZ=Asia/Shanghai
      - JVM_XMS=256m
      - JVM_XMX=512m
    ports:
      - "8080:8080"
      - "8848:8848"
      - "9848:9848"
    volumes:
      - ./nacos/logs:/home/nacos/logs
    networks:
      - zhitu-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/liveness"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  # MinIO 对象存储
  minio:
    image: minio/minio
    container_name: zhitu-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio/data:/data
      - ./minio/config:/root/.minio
    networks:
      - zhitu-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 认证服务
  auth:
    build:
      context: ../backend
      dockerfile: dockerfiles/Dockerfile.auth
    container_name: zhitu-auth
    restart: always
    environment:
      - NACOS_ADDR=${NACOS_ADDR}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - TZ=Asia/Shanghai
    ports:
      - "9200:9200"
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zhitu-net

  # 系统服务
  system:
    build:
      context: ../backend
      dockerfile: dockerfiles/Dockerfile.system
    container_name: zhitu-system
    restart: always
    environment:
      - NACOS_ADDR=${NACOS_ADDR}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - TZ=Asia/Shanghai
    ports:
      - "9201:9201"
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zhitu-net

  # 高校服务
  college:
    build:
      context: ../backend
      dockerfile: dockerfiles/Dockerfile.college
    container_name: zhitu-college
    restart: always
    environment:
      - NACOS_ADDR=${NACOS_ADDR}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - TZ=Asia/Shanghai
    ports:
      - "9202:9202"
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zhitu-net

  # 企业服务
  enterprise:
    build:
      context: ../backend
      dockerfile: dockerfiles/Dockerfile.enterprise
    container_name: zhitu-enterprise
    restart: always
    environment:
      - NACOS_ADDR=${NACOS_ADDR}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - TZ=Asia/Shanghai
    ports:
      - "9203:9203"
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zhitu-net

  # 学生服务
  student:
    build:
      context: ../backend
      dockerfile: dockerfiles/Dockerfile.student
    container_name: zhitu-student
    restart: always
    environment:
      - NACOS_ADDR=${NACOS_ADDR}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - TZ=Asia/Shanghai
    ports:
      - "9204:9204"
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zhitu-net

  # 平台服务
  platform:
    build:
      context: ../backend
      dockerfile: dockerfiles/Dockerfile.platform
    container_name: zhitu-platform
    restart: always
    environment:
      - NACOS_ADDR=${NACOS_ADDR}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - TZ=Asia/Shanghai
    ports:
      - "9205:9205"
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zhitu-net

  # 网关服务
  gateway:
    build:
      context: ../backend
      dockerfile: dockerfiles/Dockerfile.gateway
    container_name: zhitu-gateway
    restart: always
    environment:
      - NACOS_ADDR=${NACOS_ADDR}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - TZ=Asia/Shanghai
    ports:
      - "8888:8888"
    depends_on:
      - auth
      - system
      - college
      - enterprise
      - student
      - platform
    networks:
      - zhitu-net

  # 前端服务
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: zhitu-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - zhitu-net

networks:
  zhitu-net:
    driver: bridge
